<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #0a0a14; --surface: #12122a; --surface2: #1a1a3e;
    --accent: #7c3aed; --accent2: #a78bfa; --green: #10b981;
    --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
    --text: #e2e8f0; --text2: #94a3b8; --border: #2d2d44;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; }

/* Layout */
.app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

/* Sidebar */
.sidebar { background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 1.1rem; font-weight: 700;
    background: linear-gradient(135deg, var(--accent2), var(--blue));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.sidebar-header p { font-size: 0.7rem; color: var(--text2); margin-top: 4px; }
.session-list { flex: 1; overflow-y: auto; padding: 8px; }
.session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer;
    margin-bottom: 4px; transition: all 0.2s; border: 1px solid transparent; }
.session-item:hover { background: var(--surface2); border-color: var(--border); }
.session-item.active { background: rgba(124,58,237,0.15); border-color: var(--accent); }
.session-item .sid { font-family: monospace; font-size: 0.75rem; color: var(--accent2); }
.session-item .sq { font-size: 0.8rem; color: var(--text2); margin-top: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.session-item .sn { font-size: 0.65rem; color: var(--text2); margin-top: 2px; }

/* Main */
.main { display: flex; flex-direction: column; overflow: hidden; }

/* Query bar */
.query-bar { padding: 16px 24px; border-bottom: 1px solid var(--border);
    background: var(--surface); display: flex; gap: 12px; align-items: center; }
.query-input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: inherit; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s; }
.query-input:focus { border-color: var(--accent); }
.query-input::placeholder { color: var(--text2); }
.run-btn { padding: 12px 24px; border-radius: 10px; border: none;
    background: linear-gradient(135deg, var(--accent), #6d28d9);
    color: white; font-weight: 600; font-size: 0.9rem; cursor: pointer;
    transition: all 0.2s; font-family: inherit; }
.run-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,58,237,0.4); }
.run-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Content area */
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* Progress panel */
.progress-panel { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.progress-panel h3 { font-size: 0.9rem; color: var(--accent2); margin-bottom: 12px; }
.progress-log { max-height: 240px; overflow-y: auto; font-family: monospace;
    font-size: 0.8rem; line-height: 1.8; }
.log-line { padding: 2px 8px; border-radius: 4px; }
.log-node { color: var(--green); }
.log-recovery { color: var(--yellow); }
.log-info { color: var(--blue); }
.log-error { color: var(--red); }
.log-status { color: var(--text2); }

/* Spinner */
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Result card */
.result-card { background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 20px; }
.result-card h3 { font-size: 0.9rem; color: var(--green); margin-bottom: 12px; }
.result-text { font-size: 0.95rem; line-height: 1.8; white-space: pre-wrap;
    padding: 16px; background: rgba(16,185,129,0.06); border-radius: 8px;
    border: 1px solid rgba(16,185,129,0.15); }

/* Replay frame */
.replay-frame { width: 100%; border: 1px solid var(--border); border-radius: 12px;
    height: calc(100vh - 140px); background: var(--bg); }

/* Welcome */
.welcome { text-align: center; padding: 80px 40px; color: var(--text2); }
.welcome h2 { font-size: 1.5rem; color: var(--text); margin-bottom: 8px; }
.welcome p { font-size: 0.9rem; max-width: 500px; margin: 0 auto; }

/* View replay btn */
.replay-btn { display: inline-block; margin-top: 12px; padding: 8px 20px;
    border-radius: 8px; background: rgba(59,130,246,0.15); color: var(--blue);
    border: 1px solid rgba(59,130,246,0.3); cursor: pointer; font-size: 0.85rem;
    font-family: inherit; transition: all 0.2s; }
.replay-btn:hover { background: rgba(59,130,246,0.25); }
</style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>🤖 Browser Agent</h1>
            <p>Session 9 — DAG Orchestrator</p>
        </div>
        <div class="session-list" id="sessionList">
            <div style="padding:20px;color:var(--text2);font-size:0.8rem;">Loading...</div>
        </div>
    </div>

    <!-- Main -->
    <div class="main">
        <div class="query-bar">
            <input class="query-input" id="queryInput" type="text"
                placeholder="Enter your query... e.g. Compare 3 laptops under ₹80,000 on Amazon"
                onkeydown="if(event.key==='Enter')runQuery()">
            <button class="run-btn" id="runBtn" onclick="runQuery()">▶ Run Agent</button>
        </div>
        <div class="content" id="content">
            <div class="welcome" id="welcome">
                <h2>Welcome to Browser Agent</h2>
                <p>Enter a comparison query above to start, or click a past session on the left to view its replay.</p>
            </div>
        </div>
    </div>
</div>

<script>
let ws = null;

async function loadSessions() {
    try {
        const res = await fetch('/api/sessions');
        const sessions = await res.json();
        const list = document.getElementById('sessionList');
        if (!sessions.length) {
            list.innerHTML = '<div style="padding:20px;color:var(--text2);font-size:0.8rem;">No sessions yet. Run a query!</div>';
            return;
        }
        list.innerHTML = sessions.map(s => `
            <div class="session-item" onclick="viewReplay('${s.id}')" title="${s.query}">
                <div class="sid">${s.id}</div>
                <div class="sq">${s.query || '(no query)'}</div>
                <div class="sn">${s.nodes} nodes ${s.has_replay ? '• 📄 replay' : ''}</div>
            </div>
        `).join('');
    } catch(e) { console.error(e); }
}

function viewReplay(sid) {
    document.querySelectorAll('.session-item').forEach(el => el.classList.remove('active'));
    event?.target?.closest('.session-item')?.classList.add('active');
    const content = document.getElementById('content');
    content.innerHTML = `<iframe class="replay-frame" src="/api/replay/${sid}"></iframe>`;
}

function runQuery() {
    const input = document.getElementById('queryInput');
    const btn = document.getElementById('runBtn');
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    btn.textContent = '⏳ Running...';

    const content = document.getElementById('content');
    content.innerHTML = `
        <div class="progress-panel">
            <h3><span class="spinner"></span> Agent Running...</h3>
            <div class="progress-log" id="progressLog"></div>
        </div>
        <div id="resultArea"></div>
    `;

    const log = document.getElementById('progressLog');
    const resultArea = document.getElementById('resultArea');

    ws = new WebSocket(`ws://${location.host}/ws/run`);

    ws.onopen = () => {
        ws.send(JSON.stringify({ query }));
        addLog(log, `🚀 Query: ${query}`, 'status');
    };

    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        switch(msg.type) {
            case 'session':
                addLog(log, `📋 Session: ${msg.data}`, 'info');
                break;
            case 'node':
                addLog(log, msg.data, 'node');
                break;
            case 'recovery':
                addLog(log, msg.data, 'recovery');
                break;
            case 'info':
                addLog(log, msg.data, 'info');
                break;
            case 'status':
                addLog(log, msg.data, 'status');
                break;
            case 'replay_ready':
                addLog(log, '📄 Replay generated!', 'info');
                break;
            case 'complete':
                const d = msg.data;
                document.querySelector('.progress-panel h3').innerHTML = `✅ Complete — ${d.node_count} nodes`;
                if (d.final_answer) {
                    resultArea.innerHTML = `
                        <div class="result-card">
                            <h3>✅ Final Answer</h3>
                            <div class="result-text">${d.final_answer}</div>
                            ${d.session_id ? `<button class="replay-btn" onclick="viewReplay('${d.session_id}')">🔁 View Replay</button>` : ''}
                        </div>`;
                }
                btn.disabled = false;
                btn.textContent = '▶ Run Agent';
                loadSessions();
                break;
            case 'error':
                addLog(log, `❌ ${msg.data}`, 'error');
                btn.disabled = false;
                btn.textContent = '▶ Run Agent';
                break;
        }
        log.scrollTop = log.scrollHeight;
    };

    ws.onerror = () => {
        addLog(log, '❌ Connection error', 'error');
        btn.disabled = false;
        btn.textContent = '▶ Run Agent';
    };
}

function addLog(log, text, cls) {
    const div = document.createElement('div');
    div.className = `log-line log-${cls}`;
    div.textContent = text;
    log.appendChild(div);
}

loadSessions();
</script>
</body>
</html>
